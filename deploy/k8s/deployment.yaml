apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  namespace: blog
  labels:
    app: blog
spec:
  replicas: 1
  # Single node + hostPort 80/443 can't run two pods at once
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: blog
  template:
    metadata:
      labels:
        app: blog
    spec:
      containers:
        - name: blog
          image: ghcr.io/ctchen222/blog:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              hostPort: 80
            - name: https
              containerPort: 443
              hostPort: 443
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 96Mi
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            # Persist ACME certs/account across pod restarts (single node)
            - name: caddy-data
              mountPath: /data
      volumes:
        - name: caddy-data
          hostPath:
            path: /var/lib/caddy-data
            type: DirectoryOrCreate
