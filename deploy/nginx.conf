server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 256;

    # Hashed Next.js assets are immutable — cache aggressively
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # trailingSlash export emits path/index.html; also fall back to path.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
}
